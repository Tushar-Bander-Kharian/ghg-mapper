name: ghg-mapper
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - gdal>=3.7
  - rasterio>=1.3
  - geopandas>=0.14
  - xarray>=2023.1
  - numpy>=1.24
  - pandas>=2.0
  - scipy>=1.11
  - netCDF4>=1.6
  - shapely>=2.0
  - matplotlib
  - seaborn
  - pip
  - pip:
    - earthengine-api>=0.1.380
    - rioxarray>=0.15
    - rasterstats
    - pyresample
    - requests
    - hatch
